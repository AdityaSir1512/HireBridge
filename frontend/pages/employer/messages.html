<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages • Employer</title>
  <link rel="stylesheet" href="/frontend/public/css/themes.css">
  <link rel="stylesheet" href="/frontend/public/css/employer.css">
  <link rel="stylesheet" href="/frontend/public/css/responsive.css">
  <link rel="stylesheet" href="/frontend/public/css/design-system.css">
  <style>
    .messages-container { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 80px); background: var(--background-color); gap: 0; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin: 20px; }
    
    .conversations-panel { background: var(--surface-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
    .conversations-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
    .conversations-header h2 { margin: 0 0 16px; font-size: 24px; color: var(--text-color); }
    .search-box { width: 100%; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--background-color); color: var(--text-color); font-size: 14px; }
    .search-box:focus { outline: none; border-color: var(--primary-color); }
    
    .conversations-list { flex: 1; overflow-y: auto; }
    .conversation-item { padding: 16px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
    .conversation-item:hover { background: var(--background-color); }
    .conversation-item.active { background: var(--background-color); border-left: 3px solid var(--primary-color); }
    .conversation-item.unread { font-weight: 600; }
    .conversation-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-gradient); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-size: 15px; font-weight: 600; color: var(--text-color); margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-last-message { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .conversation-time { font-size: 12px; color: var(--text-secondary); }
    .conversation-badge { background: var(--primary-color); color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: 600; min-width: 20px; text-align: center; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state-icon { font-size: 64px; margin-bottom: 16px; }
    
    .chat-panel { display: flex; flex-direction: column; background: var(--background-color); }
    .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border-color); background: var(--surface-color); display: flex; align-items: center; justify-content: space-between; }
    .chat-header-user { display: flex; align-items: center; gap: 12px; }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-gradient); color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; }
    .chat-header-info h3 { margin: 0; font-size: 16px; color: var(--text-color); }
    .chat-header-info .status { font-size: 12px; color: var(--text-secondary); }
    .status.online { color: #10b981; }
    .status.online::before { content: '●'; margin-right: 4px; }
    
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; gap: 12px; max-width: 70%; }
    .message.sent { margin-left: auto; flex-direction: row-reverse; }
    .message-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-gradient); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .message-content { flex: 1; }
    .message-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .message.received .message-bubble { background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); border-bottom-left-radius: 4px; }
    .message.sent .message-bubble { background: var(--accent-gradient); color: white; border-bottom-right-radius: 4px; }
    .message-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .message.sent .message-time { text-align: right; }
    .message-attachment { max-width: 100%; margin-top: 8px; border-radius: 8px; }
    .message-attachment img { max-width: 100%; border-radius: 8px; }
    .message-attachment a { color: inherit; text-decoration: none; padding: 8px 12px; background: rgba(0,0,0,0.1); border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; }
    
    .typing-indicator { display: none; padding: 0 12px; font-size: 13px; color: var(--text-secondary); font-style: italic; }
    .typing-indicator.active { display: block; }
    
    .chat-input-container { padding: 16px 24px; border-top: 1px solid var(--border-color); background: var(--surface-color); }
    .chat-input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
    .chat-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 24px; background: var(--background-color); color: var(--text-color); font-size: 14px; resize: none; max-height: 120px; font-family: inherit; }
    .chat-input:focus { outline: none; border-color: var(--primary-color); }
    .chat-input-actions { display: flex; gap: 8px; }
    .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--surface-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
    .btn-icon:hover { background: var(--border-color); }
    .btn-send { background: var(--accent-gradient); color: white; }
    .btn-send:hover { transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .no-conversation-selected { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; color: var(--text-secondary); }
    .no-conversation-selected-icon { font-size: 80px; margin-bottom: 16px; }
    
    @media (max-width: 768px) {
      .messages-container { grid-template-columns: 1fr; margin: 10px; }
      .conversations-panel.has-active { display: none; }
      .chat-panel.no-active { display: none; }
    }
  </style>
</head>
<body>
  <header class="nav-employer">
    <a href="/frontend/pages/employer/dashboard.html" class="nav-brand">
      <img src="/frontend/public/assets/images/hirebridge-logo-full.svg" alt="HireBridge Logo">
      <span class="nav-brand-text">HireBridge • Employer</span>
    </a>
    <nav class="nav-menu">
      <a href="/frontend/pages/employer/dashboard.html">Dashboard</a>
      <a href="/frontend/pages/employer/post-job.html">Post Job</a>
      <a href="/frontend/pages/employer/manage-jobs.html">Manage Jobs</a>
      <a href="/frontend/pages/employer/applications.html">Applications</a>
      <a href="/frontend/pages/employer/candidates.html">Candidates</a>
      <a href="/frontend/pages/employer/settings.html">Settings</a>
      <button class="btn notification-bell" onclick="HB.showNotifications()">
        <span>🔔</span>
        <span class="notification-badge" id="notificationBadge">0</span>
      </button>
      <button class="btn theme-toggle" onclick="HB.toggleTheme()">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="btn-logout" onclick="HB.logout()">Logout</button>
    </nav>
  </header>

  <div class="messages-container">
    <!-- Conversations Panel -->
    <div class="conversations-panel" id="conversationsPanel">
      <div class="conversations-header">
        <h2>💬 Messages</h2>
        <input type="text" class="search-box" id="searchBox" placeholder="Search conversations...">
      </div>
      <div class="conversations-list" id="conversationsList">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <p>No conversations yet</p>
          <p style="font-size: 13px;">Candidates will message you about job applications</p>
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="no-conversation-selected">
        <div class="no-conversation-selected-icon">💬</div>
        <h3>Select a conversation to start messaging</h3>
        <p style="font-size: 14px;">Choose a conversation from the left to view messages</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="/frontend/public/js/common/api.js"></script>
  <script src="/frontend/public/js/common/router.js"></script>
  <script src="/frontend/public/js/common/auth.js"></script>
  <script src="/frontend/public/js/common/notifications.js"></script>
  <script>
    let socket = null;
    let currentUser = null;
    let activeConversation = null;
    let conversations = [];
    let typingTimeout = null;

    // Initialize
    async function init() {
      currentUser = HB?.auth?.getUser();
      if (!currentUser || !currentUser.userId) {
        window.location.href = '/frontend/public/login.html';
        return;
      }

      connectSocket();
      await loadConversations();
      setupEventListeners();
    }

    // Connect to Socket.io
    function connectSocket() {
      socket = io('http://localhost:3009', {
        transports: ['websocket', 'polling']
      });

      socket.on('connect', () => {
        console.log('Socket connected');
        socket.emit('user:online', currentUser.userId);
      });

      socket.on('message:new', handleNewMessage);
      socket.on('message:read', handleMessageRead);
      socket.on('typing:user', handleTyping);
      socket.on('user:status', handleUserStatus);
      socket.on('message:notification', handleMessageNotification);

      socket.on('disconnect', () => {
        console.log('Socket disconnected');
      });

      socket.on('connect_error', (error) => {
        console.error('Socket connection error:', error);
      });
    }

    // Load conversations
    async function loadConversations() {
      try {
        const token = HB?.auth?.getToken();
        const response = await fetch(`http://localhost:3000/api/messages/conversations/${currentUser.userId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.success) {
          conversations = data.conversations || [];
          renderConversations();
        }
      } catch (error) {
        console.error('Error loading conversations:', error);
      }
    }

    // Render conversations list
    function renderConversations() {
      const list = document.getElementById('conversationsList');
      
      if (conversations.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <p>No conversations yet</p>
            <p style="font-size: 13px;">Candidates will message you about job applications</p>
          </div>
        `;
        return;
      }

      list.innerHTML = conversations.map(conv => {
        const otherParticipant = conv.participantDetails?.find(p => p.userId !== currentUser.userId);
        const name = otherParticipant?.name || 'Candidate';
        const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        const lastMessage = conv.lastMessage?.text || 'No messages yet';
        const time = conv.lastMessageAt ? formatTime(new Date(conv.lastMessageAt)) : '';
        const unread = conv.unreadCount || 0;
        
        return `
          <div class="conversation-item ${activeConversation?._id === conv._id ? 'active' : ''} ${unread > 0 ? 'unread' : ''}" 
               onclick="selectConversation('${conv._id}')">
            <div class="conversation-avatar">${initials}</div>
            <div class="conversation-info">
              <div class="conversation-name">${name}</div>
              <div class="conversation-last-message">${lastMessage}</div>
            </div>
            <div class="conversation-meta">
              <div class="conversation-time">${time}</div>
              ${unread > 0 ? `<div class="conversation-badge">${unread}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // Select conversation
    async function selectConversation(conversationId) {
      activeConversation = conversations.find(c => c._id === conversationId);
      if (!activeConversation) return;

      // Join socket room
      if (socket) {
        socket.emit('conversation:join', conversationId);
      }

      // Load messages
      await loadMessages(conversationId);
      
      // Mark as read
      markConversationAsRead(conversationId);
      
      // Update UI
      renderConversations();
      document.getElementById('conversationsPanel').classList.add('has-active');
      document.getElementById('chatPanel').classList.remove('no-active');
    }

    // Load messages
    async function loadMessages(conversationId) {
      try {
        const token = HB?.auth?.getToken();
        const response = await fetch(`http://localhost:3000/api/messages/conversation/${conversationId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.success) {
          renderChat(data.messages || []);
        }
      } catch (error) {
        console.error('Error loading messages:', error);
      }
    }

    // Render chat
    function renderChat(messages) {
      const otherParticipant = activeConversation.participantDetails?.find(p => p.userId !== currentUser.userId);
      const name = otherParticipant?.name || 'Unknown User';
      const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

      const chatPanel = document.getElementById('chatPanel');
      chatPanel.innerHTML = `
        <div class="chat-header">
          <div class="chat-header-user">
            <div class="chat-header-avatar">${initials}</div>
            <div class="chat-header-info">
              <h3>${name}</h3>
              <div class="status" id="userStatus">Offline</div>
            </div>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          ${messages.map(msg => renderMessage(msg)).join('')}
        </div>
        <div class="typing-indicator" id="typingIndicator">Typing...</div>
        <div class="chat-input-container">
          <div class="chat-input-wrapper">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Attach file">
              📎
            </button>
            <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(event)">
            <textarea class="chat-input" id="messageInput" placeholder="Type a message..." rows="1" 
                     oninput="handleTyping()" onkeydown="handleKeyDown(event)"></textarea>
            <button class="btn-icon btn-send" id="sendBtn" onclick="sendMessage()" disabled>
              ➤
            </button>
          </div>
        </div>
      `;

      scrollToBottom();
      document.getElementById('messageInput').focus();

      // Auto-resize textarea
      const textarea = document.getElementById('messageInput');
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
      });

      // Check user status
      if (socket && otherParticipant) {
        socket.emit('user:check-status', otherParticipant.userId);
      }
    }

    // Render single message
    function renderMessage(msg) {
      const isSent = msg.senderId === currentUser.userId;
      const initials = isSent ? 'You' : 'C';
      const time = formatTime(new Date(msg.createdAt));

      return `
        <div class="message ${isSent ? 'sent' : 'received'}" id="msg-${msg._id}">
          <div class="message-avatar">${initials}</div>
          <div class="message-content">
            <div class="message-bubble">
              ${msg.text}
              ${msg.attachmentUrl ? `<div class="message-attachment"><a href="${msg.attachmentUrl}" target="_blank">📎 ${msg.attachmentName || 'Attachment'}</a></div>` : ''}
            </div>
            <div class="message-time">${time}${msg.read && isSent ? ' • Read' : ''}</div>
          </div>
        </div>
      `;
    }

    // Send message
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();

      if (!text || !activeConversation || !socket) return;

      const tempId = Date.now();
      const messageData = {
        tempId,
        conversationId: activeConversation._id,
        senderId: currentUser.userId,
        recipientId: activeConversation.participants.find(p => p !== currentUser.userId),
        text
      };

      socket.emit('message:send', messageData);
      
      // Clear input
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;

      // Stop typing indicator
      if (socket) {
        socket.emit('typing:stop', {
          conversationId: activeConversation._id,
          userId: currentUser.userId
        });
      }
    }

    // Handle new message
    function handleNewMessage(message) {
      if (!activeConversation || message.conversationId !== activeConversation._id) {
        // Update conversation list
        loadConversations();
        return;
      }

      // Append message to chat
      const messagesContainer = document.getElementById('chatMessages');
      if (messagesContainer) {
        const messageHTML = renderMessage(message);
        messagesContainer.insertAdjacentHTML('beforeend', messageHTML);
        scrollToBottom();

        // Mark as read if we're the recipient
        if (message.recipientId === currentUser.userId && socket) {
          socket.emit('message:read', {
            messageId: message._id,
            conversationId: message.conversationId
          });
        }
      }
    }

    // Handle typing
    function handleTyping() {
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      
      sendBtn.disabled = !input.value.trim();

      if (!socket || !activeConversation) return;

      socket.emit('typing:start', {
        conversationId: activeConversation._id,
        userId: currentUser.userId
      });

      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing:stop', {
          conversationId: activeConversation._id,
          userId: currentUser.userId
        });
      }, 1000);
    }

    // Handle typing indicator
    function handleTyping(data) {
      if (data.userId === currentUser.userId) return;
      
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        if (data.isTyping) {
          indicator.classList.add('active');
        } else {
          indicator.classList.remove('active');
        }
      }
    }

    // Handle key down
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Handle user status
    function handleUserStatus(data) {
      const statusEl = document.getElementById('userStatus');
      if (statusEl) {
        statusEl.textContent = data.status === 'online' ? 'Online' : 'Offline';
        statusEl.className = `status ${data.status}`;
      }
    }

    // Handle message read
    function handleMessageRead(data) {
      const messageEl = document.getElementById(`msg-${data.messageId}`);
      if (messageEl) {
        const timeEl = messageEl.querySelector('.message-time');
        if (timeEl && !timeEl.textContent.includes('Read')) {
          timeEl.textContent += ' • Read';
        }
      }
    }

    // Handle message notification
    function handleMessageNotification(data) {
      loadConversations();
    }

    // Mark conversation as read
    async function markConversationAsRead(conversationId) {
      try {
        const token = HB?.auth?.getToken();
        await fetch(`http://localhost:3000/api/messages/conversation/${conversationId}/read`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            'X-User-Id': currentUser.userId
          }
        });

        // Update local conversation
        const conv = conversations.find(c => c._id === conversationId);
        if (conv) {
          conv.unreadCount = 0;
          renderConversations();
        }
      } catch (error) {
        console.error('Error marking as read:', error);
      }
    }

    // File upload
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const formData = new FormData();
        formData.append('file', file);

        const token = HB?.auth?.getToken();
        const response = await fetch('http://localhost:3000/api/messages/attachment', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        const data = await response.json();
        if (data.success && socket) {
          socket.emit('message:send', {
            conversationId: activeConversation._id,
            senderId: currentUser.userId,
            recipientId: activeConversation.participants.find(p => p !== currentUser.userId),
            text: '',
            attachmentUrl: data.url
          });
        }
      } catch (error) {
        console.error('Error uploading file:', error);
        alert('Failed to upload file');
      }

      event.target.value = '';
    }

    // Search conversations
    document.getElementById('searchBox')?.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = conversations.filter(conv => {
        const otherParticipant = conv.participantDetails?.find(p => p.userId !== currentUser.userId);
        const name = otherParticipant?.name || '';
        return name.toLowerCase().includes(query);
      });
      
      const list = document.getElementById('conversationsList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No conversations found</p></div>';
      } else {
        conversations = filtered;
        renderConversations();
      }
    });

    // Utility functions
    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
      if (diff < 86400000) return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      if (diff < 604800000) return date.toLocaleDateString('en-US', { weekday: 'short' });
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function scrollToBottom() {
      const container = document.getElementById('chatMessages');
      if (container) {
        setTimeout(() => container.scrollTop = container.scrollHeight, 100);
      }
    }

    function setupEventListeners() {
      // Handle page visibility for reconnection
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && socket && !socket.connected) {
          socket.connect();
        }
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', init);

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (socket) {
        socket.disconnect();
      }
    });
  </script>
</body>
</html>
