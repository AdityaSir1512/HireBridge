<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Details • HireBridge</title>
  <link rel="stylesheet" href="/frontend/public/css/themes.css">
  <link rel="stylesheet" href="/frontend/public/css/job-seeker.css">
  <link rel="stylesheet" href="/frontend/public/css/responsive.css">
  <link rel="stylesheet" href="/frontend/public/css/design-system.css">
  <link rel="stylesheet" href="/frontend/public/css/notifications.css">
  <style>
    body {
      background: var(--background-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }

    .job-detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 32px;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      gap: 12px;
      color: var(--primary-hover);
    }

    .job-header {
      background: var(--surface-color);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid var(--border-color);
      box-shadow: var(--card-shadow);
      margin-bottom: 24px;
    }

    .job-title {
      font-size: 42px;
      font-weight: 800;
      margin: 0 0 16px 0;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--background-color);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .meta-item .icon {
      font-size: 18px;
    }

    .job-type-badge {
      display: inline-block;
      padding: 8px 20px;
      background: var(--accent-gradient);
      color: #fff;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .job-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-apply {
      flex: 1;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-apply:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5);
    }

    .btn-apply:active {
      transform: translateY(0);
    }

    .btn-apply:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-save {
      padding: 16px 24px;
      background: var(--surface-color);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-color);
      font-weight: 600;
    }

    .btn-save:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    .job-content {
      background: var(--surface-color);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid var(--border-color);
      box-shadow: var(--card-shadow);
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 20px 0;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title .icon {
      font-size: 28px;
    }

    .job-description {
      color: var(--text-secondary);
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .requirements-list,
    .benefits-list {
      list-style: none;
      padding: 0;
      margin: 0 0 32px 0;
    }

    .requirements-list li,
    .benefits-list li {
      padding: 12px 0 12px 40px;
      position: relative;
      color: var(--text-secondary);
      line-height: 1.6;
      border-bottom: 1px solid var(--border-color);
    }

    .requirements-list li:last-child,
    .benefits-list li:last-child {
      border-bottom: none;
    }

    .requirements-list li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #10b981;
      font-weight: 700;
      font-size: 20px;
    }

    .benefits-list li::before {
      content: '⭐';
      position: absolute;
      left: 0;
      font-size: 18px;
    }

    .company-info {
      background: var(--background-color);
      border-radius: 16px;
      padding: 24px;
      margin-top: 32px;
      border: 1px solid var(--border-color);
    }

    .company-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 8px;
    }

    .company-description {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      color: #c00;
    }

    /* Application Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .application-modal {
      background: var(--surface-color);
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      color: var(--text-color);
    }

    .btn-close {
      background: transparent;
      border: none;
      font-size: 28px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .btn-close:hover {
      background: var(--background-color);
      color: var(--text-color);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-color);
      font-size: 14px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 15px;
      background: var(--background-color);
      color: var(--text-color);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }

    .help-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px 24px;
      background: var(--background-color);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-color);
      transition: all 0.2s ease;
    }

    .btn-cancel:hover {
      border-color: var(--text-secondary);
    }

    .btn-submit {
      flex: 1;
      padding: 14px 24px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 768px) {
      .job-header {
        padding: 24px;
      }

      .job-title {
        font-size: 32px;
      }

      .job-content {
        padding: 24px;
      }

      .job-actions {
        flex-direction: column;
      }

      .application-modal {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="job-detail-container">
    <a href="/frontend/pages/job-seeker/jobs.html" class="back-link">
      ← Back to Jobs
    </a>

    <div id="jobContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading job details...</p>
      </div>
    </div>
  </div>

  <!-- Application Modal -->
  <div id="applicationModal" class="modal-overlay hidden">
    <div class="application-modal">
      <div class="modal-header">
        <h2>Apply for this Job</h2>
        <button class="btn-close" onclick="closeApplicationModal()">×</button>
      </div>
      
      <form id="applicationForm">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" id="applicantName" class="form-input" required placeholder="Your full name">
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" id="applicantEmail" class="form-input" required placeholder="your.email@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Cover Letter</label>
          <textarea id="coverLetter" class="form-textarea" placeholder="Tell us why you're a great fit for this position..."></textarea>
          <p class="help-text">Optional: Add a personalized message to stand out</p>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeApplicationModal()">Cancel</button>
          <button type="submit" class="btn-submit" id="submitApplication">Submit Application</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/frontend/public/js/common/router.js"></script>
  <script src="/frontend/public/js/common/auth.js"></script>
  <script src="/frontend/public/js/common/api.js"></script>
  <script src="/frontend/public/js/common/notifications.js"></script>
  <script>
    let currentJobId = null;
    let currentJob = null;

    // Helper function to decode JWT token
    function decodeToken(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (error) {
        console.error('Error decoding token:', error);
        return null;
      }
    }

    async function loadUserProfile() {
      try {
        const token = HB?.auth?.getToken?.();
        if (!token) return null;

        const tokenData = decodeToken(token);
        if (!tokenData || !tokenData.userId) return null;

        const response = await fetch(`http://localhost:3000/api/users/profile/${tokenData.userId}`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const data = await response.json();
          return data.user || data;
        }
      } catch (error) {
        console.error('Error loading user profile:', error);
      }
      return null;
    }

    async function loadJob() {
      const id = new URLSearchParams(location.search).get('id');
      const root = document.getElementById('jobContent');
      
      if (!id) {
        root.innerHTML = '<div class="error-state">Missing job ID</div>';
        return;
      }

      currentJobId = id;

      try {
        const j = await HB.api.getJob(id);
        const job = j?.job || j;
        currentJob = job;

        const jobType = job.jobType || job.type || 'Full Time';
        const location = job.location || 'Remote';
        const salary = job.salary || 'Competitive';
        const company = job.company || 'Company';
        const description = job.description || 'No description available.';
        const requirements = job.requirements || [];
        const benefits = job.benefits || [];

        // Check if job is already saved
        const savedJobs = getSavedJobIds();
        const isJobSaved = savedJobs.has(job._id);

        root.innerHTML = `
          <div class="job-header">
            <h1 class="job-title">${job.title || 'Untitled Position'}</h1>
            
            <div class="job-meta">
              <div class="meta-item">
                <span class="icon">🏢</span>
                <span>${company}</span>
              </div>
              <div class="meta-item">
                <span class="icon">📍</span>
                <span>${location}</span>
              </div>
              <div class="meta-item">
                <span class="icon">💰</span>
                <span>${salary}</span>
              </div>
              <div class="meta-item">
                <span class="job-type-badge">${jobType}</span>
              </div>
            </div>

            <div class="job-actions">
              <button class="btn-apply" onclick="openApplicationModal()">
                Apply Now 🚀
              </button>
              <button class="btn-save" onclick="saveJob()">
                ${isJobSaved ? '❤️ Saved' : '💾 Save'}
              </button>
            </div>
          </div>

          <div class="job-content">
            <div class="section-title">
              <span class="icon">📋</span>
              <span>Job Description</span>
            </div>
            <div class="job-description">${description}</div>

            ${requirements.length > 0 ? `
              <div class="section-title">
                <span class="icon">✅</span>
                <span>Requirements</span>
              </div>
              <ul class="requirements-list">
                ${requirements.map(req => `<li>${req}</li>`).join('')}
              </ul>
            ` : ''}

            ${benefits.length > 0 ? `
              <div class="section-title">
                <span class="icon">🎁</span>
                <span>Benefits</span>
              </div>
              <ul class="benefits-list">
                ${benefits.map(benefit => `<li>${benefit}</li>`).join('')}
              </ul>
            ` : ''}

            <div class="company-info">
              <div class="company-name">About ${company}</div>
              <div class="company-description">
                ${job.companyDescription || 'Join our team and make an impact!'}
              </div>
            </div>
          </div>
        `;

        // Auto-open modal if apply=true in URL
        if (new URLSearchParams(location.search).get('apply') === 'true') {
          setTimeout(() => openApplicationModal(), 300);
        }

      } catch (err) {
        console.error('Error loading job:', err);
        root.innerHTML = `<div class="error-state">Failed to load job details: ${err.message}</div>`;
      }
    }

    async function openApplicationModal() {
      // Load user profile to pre-fill form
      const user = await loadUserProfile();
      
      if (user) {
        if (user.name) document.getElementById('applicantName').value = user.name;
        if (user.email) document.getElementById('applicantEmail').value = user.email;
      }

      document.getElementById('applicationModal').classList.remove('hidden');
    }

    function closeApplicationModal() {
      document.getElementById('applicationModal').classList.add('hidden');
      document.getElementById('applicationForm').reset();
    }

    async function submitApplication(e) {
      e.preventDefault();

      const submitBtn = document.getElementById('submitApplication');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        // Validate that we have the job data with employerId
        if (!currentJob || !currentJob.employerId) {
          throw new Error('Job information is missing. Please refresh the page and try again.');
        }

        const applicationData = {
          jobId: currentJobId,
          employerId: currentJob.employerId,
          coverLetter: document.getElementById('coverLetter').value || '',
          applicantName: document.getElementById('applicantName').value,
          applicantEmail: document.getElementById('applicantEmail').value
        };

        console.log('📤 Submitting application:', applicationData);

        const response = await HB.api.applyJob(applicationData);
        
        console.log('✅ Application submitted successfully:', response);

        // Close modal
        closeApplicationModal();

        // Show success notification
        if (window.HB && window.HB.notifications && window.HB.notifications.showToast) {
          window.HB.notifications.showToast({
            title: 'Application Submitted! 🎉',
            message: `Your application for ${currentJob.title} has been successfully submitted.`,
            icon: '✓'
          });
        } else {
          alert('Application submitted successfully! ✓');
        }

        // Update apply button
        const applyBtns = document.querySelectorAll('.btn-apply');
        applyBtns.forEach(btn => {
          btn.textContent = '✓ Applied';
          btn.disabled = true;
        });

      } catch (error) {
        console.error('Application error:', error);
        
        if (window.HB && window.HB.notifications && window.HB.notifications.showToast) {
          window.HB.notifications.showToast({
            title: 'Application Failed',
            message: error.message || 'Failed to submit application. Please try again.',
            icon: '⚠️'
          });
        } else {
          alert('Failed to submit application: ' + error.message);
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
      }
    }

    // Get user-specific saved jobs
    function getUserId() {
      const token = localStorage.getItem('hb_token') || localStorage.getItem('token');
      if (!token) return null;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.userId;
      } catch (error) {
        console.error('Error parsing token:', error);
        return null;
      }
    }

    function getSavedJobsKey() {
      const userId = getUserId();
      return userId ? `savedJobs_${userId}` : 'savedJobs';
    }

    function getSavedJobIds() {
      const key = getSavedJobsKey();
      return new Set(JSON.parse(localStorage.getItem(key) || '[]'));
    }

    function saveSavedJobIds(jobIds) {
      const key = getSavedJobsKey();
      localStorage.setItem(key, JSON.stringify([...jobIds]));
    }

    async function saveJob() {
      try {
        const jobId = currentJob?._id;
        if (!jobId) {
          alert('Job ID not found');
          return;
        }

        const savedJobs = getSavedJobIds();
        const isAlreadySaved = savedJobs.has(jobId);
        
        if (isAlreadySaved) {
          savedJobs.delete(jobId);
          saveSavedJobIds(savedJobs);
          
          if (window.HB && window.HB.notifications && window.HB.notifications.showToast) {
            window.HB.notifications.showToast({
              title: 'Job Removed',
              message: 'This job has been removed from your saved jobs.',
              icon: '🗑️'
            });
          } else {
            alert('Job removed from saved jobs!');
          }
          
          // Update button text
          const saveBtn = document.querySelector('.btn-save');
          if (saveBtn) {
            saveBtn.innerHTML = '💾 Save';
          }
        } else {
          savedJobs.add(jobId);
          saveSavedJobIds(savedJobs);
          
          if (window.HB && window.HB.notifications && window.HB.notifications.showToast) {
            window.HB.notifications.showToast({
              title: 'Job Saved',
              message: 'This job has been added to your saved jobs.',
              icon: '💾'
            });
          } else {
            alert('Job saved successfully!');
          }
          
          // Update button text
          const saveBtn = document.querySelector('.btn-save');
          if (saveBtn) {
            saveBtn.innerHTML = '❤️ Saved';
          }
        }
      } catch (error) {
        console.error('Save error:', error);
      }
    }

    // Event listeners
    document.getElementById('applicationForm').addEventListener('submit', submitApplication);
    window.addEventListener('DOMContentLoaded', loadJob);

    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeApplicationModal();
      }
    });

    // Close modal on overlay click
    document.getElementById('applicationModal').addEventListener('click', (e) => {
      if (e.target.id === 'applicationModal') {
        closeApplicationModal();
      }
    });
  </script>
</body>
</html>
