<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favCircle" x1="32" y1="0" x2="32" y2="64">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="favPerson" x1="32" y1="24" x2="32" y2="56">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <!-- Text path for curved text -->
    <path id="textPathFav" d="M 14,32 A 18,18 0 0,1 50,32" fill="none"/>
  </defs>
  
  <!-- Circle background -->
  <circle cx="32" cy="32" r="31" fill="url(#favCircle)"/>
  
  <!-- Curved text at top -->
  <text fill="#1e3a8a" font-family="Arial, sans-serif" font-size="7" font-weight="bold" letter-spacing="0.8">
    <textPath href="#textPathFav" startOffset="50%" text-anchor="middle">
      HIREBRIDGE
    </textPath>
  </text>
  
  <!-- Business person silhouette -->
  <g>
    <!-- Head -->
    <circle cx="32" cy="28" r="7" fill="#ffffff"/>
    
    <!-- Neck -->
    <ellipse cx="32" cy="35" rx="4" ry="2.5" fill="#ffffff"/>
    
    <!-- Body/suit -->
    <path d="M 32 36 L 21 44 L 21 56 Q 21 57 22 57 L 42 57 Q 43 57 43 56 L 43 44 L 32 36 Z" 
          fill="url(#favPerson)"/>
    
    <!-- Tie -->
    <path d="M 32 36 L 30 42 L 30.5 48 L 32 52 L 33.5 48 L 34 42 L 32 36 Z" 
          fill="#1e3a8a" 
          opacity="0.9"/>
    
    <!-- Collar -->
    <path d="M 26 38 L 32 36 L 38 38 L 37 40 L 32 38.5 L 27 40 Z" 
          fill="#ffffff" 
          opacity="0.95"/>
    
    <!-- Arms -->
    <path d="M 21 44 L 13 50 L 12 51 L 13 52 L 16 50 L 22 46" 
          fill="#1e3a8a" opacity="0.8"/>
    <path d="M 43 44 L 51 50 L 52 51 L 51 52 L 48 50 L 42 46" 
          fill="#1e3a8a" opacity="0.8"/>
  </g>
</svg>
