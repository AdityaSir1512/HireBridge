<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the circle background -->
    <linearGradient id="circleGradient" x1="100" y1="0" x2="100" y2="200">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the business person -->
    <linearGradient id="personGradient" x1="100" y1="60" x2="100" y2="175">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Text path for curved text -->
    <path id="textPath" d="M 40,100 A 60,60 0 0,1 160,100" fill="none"/>
  </defs>
  
  <!-- Outer circle with gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#circleGradient)" filter="url(#logoShadow)"/>
  
  <!-- Curved text at top -->
  <text fill="#1e3a8a" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="2">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">
      HIREBRIDGE
    </textPath>
  </text>
  
  <!-- Business person silhouette -->
  <g filter="url(#glow)">
    <!-- Head -->
    <circle cx="100" cy="70" r="22" fill="#ffffff"/>
    
    <!-- Neck/collar base -->
    <ellipse cx="100" cy="92" rx="12" ry="7" fill="#ffffff"/>
    
    <!-- Shoulders and body (suit jacket) -->
    <path d="M 100 95 L 65 120 L 65 175 Q 65 180 70 180 L 130 180 Q 135 180 135 175 L 135 120 L 100 95 Z" 
          fill="url(#personGradient)"/>
    
    <!-- Tie -->
    <path d="M 100 95 L 92 115 L 95 140 L 100 160 L 105 140 L 108 115 L 100 95 Z" 
          fill="#1e3a8a" 
          opacity="0.9"/>
    
    <!-- Collar/shirt -->
    <path d="M 80 100 L 100 95 L 120 100 L 115 110 L 100 105 L 85 110 Z" 
          fill="#ffffff" 
          opacity="0.95"/>
    
    <!-- Suit lapels -->
    <path d="M 80 105 L 70 120 L 67 135 L 77 130 Z" 
          fill="#0c4a6e" 
          opacity="0.6"/>
    <path d="M 120 105 L 130 120 L 133 135 L 123 130 Z" 
          fill="#0c4a6e" 
          opacity="0.6"/>
    
    <!-- Arms/hands extending outward (connecting gesture) -->
    <path d="M 65 120 L 40 140 L 35 145 L 40 150 L 50 145 L 70 130" 
          fill="#1e3a8a" 
          stroke="#0c4a6e" 
          stroke-width="2"/>
    <path d="M 135 120 L 160 140 L 165 145 L 160 150 L 150 145 L 130 130" 
          fill="#1e3a8a" 
          stroke="#0c4a6e" 
          stroke-width="2"/>
  </g>
  
  <!-- Bottom curve (base) -->
  <path d="M 25 150 Q 100 190 175 150" 
        stroke="#0e7490" 
        stroke-width="4" 
        fill="none" 
        opacity="0.4"/>
</svg>
