<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • HireBridge</title>
  <link rel="icon" type="image/svg+xml" href="/frontend/public/assets/images/hirebridge-logo-full.svg">
  <link rel="stylesheet" href="/frontend/public/css/themes.css">
  <link rel="stylesheet" href="/frontend/public/css/design-system.css">
  <link rel="stylesheet" href="/frontend/public/css/responsive.css">
  <style>
    .auth-container {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.1);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-header h1 {
      font-size: 32px;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #8b5cf6, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-header p {
      color: var(--text-secondary);
      margin: 0;
      font-size: 15px;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
    }
    .form-input {
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      background: var(--background-color);
      color: var(--text-color);
      font-size: 15px;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }
    .submit-btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #8b5cf6, #14b8a6);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }
    .auth-footer p {
      color: var(--text-secondary);
      margin: 0;
      font-size: 14px;
    }
    .auth-footer a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .err {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
    <header class="site-header">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
      <a href="/frontend/public/index.html" class="brand" style="text-decoration: none; cursor: pointer;">
        <span class="logo"></span>
        <span>HireBridge</span>
      </a>
      <nav class="primary-nav">
        <a href="/frontend/public/register.html" class="btn">Sign up</a>
        <button class="btn theme-toggle" onclick="HB.toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
      </nav>
    </div>
  </header>
  
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to HireBridge</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" required type="email" name="email" placeholder="you@example.com">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" required type="password" name="password" placeholder="Enter your password">
        </div>
        
        <button class="submit-btn" type="submit">Sign In</button>
        
        <div id="error" class="err" style="display: none;"></div>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="/frontend/public/register.html">Create one</a></p>
      </div>
    </div>
  </main>
  
  <script src="/frontend/public/js/common/router.js"></script>
  <script src="/frontend/public/js/common/auth.js"></script>
  <script src="/frontend/public/js/common/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = new FormData(e.currentTarget);
      const email = form.get('email');
      const password = form.get('password');
      const err = document.getElementById('error');
      err.textContent = '';
      err.style.display = 'none';
      try{
        const res = await HB.api.login({ email, password });
        if(res && res.token){ HB.auth.setToken(res.token); }
        const userType = res?.user?.userType;
        if(userType === 'employer'){
          HB.navigateTo('/frontend/pages/employer/dashboard.html');
        } else {
          HB.navigateTo('/frontend/pages/job-seeker/dashboard.html');
        }
      } catch(ex){
        err.textContent = ex.message || 'Login failed';
        err.style.display = 'block';
      }
    });
  </script>
  <script src="/frontend/public/js/common/auth.js"></script>
  <script src="/frontend/public/js/common/chatbot.js"></script>
</body>
</html>
